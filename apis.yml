description: >-
  CalAtlantic Group was a U.S. homebuilder formed on October 1, 2015 through the
  merger of Standard Pacific Homes and Ryland Homes. Headquartered in Arlington,
  Virginia, it became the fourth largest homebuilder in the United States before
  being acquired by Lennar Corporation in February 2018, which made Lennar the
  nation's largest homebuilder. CalAtlantic no longer operates as an independent
  entity and does not offer public APIs or developer resources.
